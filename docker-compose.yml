version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: serveconnect-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - serveconnect-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: serveconnect-redis
    ports:
      - "6379:6379"
    networks:
      - serveconnect-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serveconnect-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/serveconnect
      - JWT_SECRET=serveconnect-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
      - redis
    networks:
      - serveconnect-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serveconnect-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - serveconnect-network

volumes:
  mongo-data:

networks:
  serveconnect-network:
    driver: bridge
